syntax = "proto3";

package quickwit.search;

service SearchService {
  // Root search API.
  // This RPC identifies the set of splits on which the query should run on,
  // and dispatch the several calls to `LeafSearch`.
  //
  // It is also in charge of merging back the results.
  rpc RootSearch(SearchRequest) returns (SearchResponse);

  // Perform a leaf search on a given set of splits.
  //
  // It is like a regular search except that:
  // - the node should perform the search locally instead of dispatching
  //   it to other nodes.
  // - it should be applied on the given subset of splits
  // - Hit content is not fetched, and we instead return so called `PartialHit`.
  rpc LeafSearch(LeafSearchRequest) returns (LeafSearchResponse);

  /// Fetches the documents contents from the document store.
  /// This methods takes `PartialHit`s and returns `Hit`s.
  rpc FetchDocs(FetchDocsRequest) returns (FetchDocsResponse);

  // Root list terms API.
  // This RPC identifies the set of splits on which the query should run on,
  // and dispatches the several calls to `LeafListTerms`.
  //
  // It is also in charge of merging back the results.
  rpc RootListTerms(ListTermsRequest) returns (ListTermsResponse);

  // Performs a leaf list terms on a given set of splits.
  //
  // It is like a regular list term except that:
  // - the node should perform the listing locally instead of dispatching
  //   it to other nodes.
  // - it should be applied on the given subset of splits
  rpc LeafListTerms(LeafListTermsRequest) returns (LeafListTermsResponse);

  // Performs a scroll request.
  rpc Scroll(ScrollRequest) returns (SearchResponse);

  // gRPC request used to store a key in the local storage of the targeted node.
  // This RPC is used in the mini distributed immutable KV store embedded in quickwit.
  rpc PutKV(PutKVRequest) returns (PutKVResponse);

  // Gets a key from the local storage of the targeted node.
  // This RPC is used in the mini distributed immutable KV store embedded in quickwit.
  rpc GetKV(GetKVRequest) returns (GetKVResponse);

  rpc ReportSplits(ReportSplitsRequest) returns (ReportSplitsResponse);

  rpc ListFields(ListFieldsRequest) returns (ListFieldsResponse);

  rpc LeafListFields(LeafListFieldsRequest) returns (ListFieldsResponse);

  // Describe how a search would be processed.
  rpc SearchPlan(SearchRequest) returns (SearchPlanResponse);
}

/// Scroll Request
message ScrollRequest {
  /// The `scroll_id` is the given in the response of a search request including a scroll.
  string scroll_id = 1;
  optional uint32 scroll_ttl_secs = 2;
}

message PutKVRequest {
  bytes key = 1;
  bytes payload = 2;
  uint32 ttl_secs = 3;
}

message PutKVResponse {}

message GetKVRequest {
  bytes key = 1;
}

message GetKVResponse {
  optional bytes payload = 1;
}


message ReportSplit {
  // Split id (ULID format `01HAV29D4XY3D462FS3D8K5Q2H`)
  string split_id = 2;
  // The storage uri. This URI does NOT include the split id.
  string storage_uri = 1;
}

message ReportSplitsRequest {
  repeated ReportSplit report_splits = 1;
}

message ReportSplitsResponse {}

// -- ListFields -------------------

message ListFieldsRequest {
  // Index ID patterns
  repeated string index_id_patterns = 1;
  // Optional limit query to a list of fields
  // Wildcard expressions are supported.
  repeated string fields = 2;

  // Time filter, expressed in seconds since epoch.
  // That filter is to be interpreted as the semi-open interval:
  // [start_timestamp, end_timestamp).
  optional int64 start_timestamp = 3;
  optional int64 end_timestamp = 4;

  // JSON-serialized QueryAst for index_filter support.
  // When provided, only fields from documents matching this query are returned.
  optional string query_ast = 5;

  // Control if the request will fail if split_ids contains a split that does not exist.
  // optional bool fail_on_missing_index = 6;
}

message LeafListFieldsRequest {
  // The index id
  string index_id = 1;
  // The index uri
  string index_uri = 2;
  // Index split ids to apply the query on.
  // This ids are resolved from the index_uri defined in the search_request.
  repeated SplitIdAndFooterOffsets split_offsets = 3;

  // Optional limit query to a list of fields
  // Wildcard expressions are supported.
  repeated string fields = 4;
}

message ListFieldsResponse {
  repeated ListFieldsEntryResponse fields = 1;
}

message ListFieldsEntryResponse {
  string field_name = 1;
  ListFieldType field_type = 2;
  // The index ids the field exists
  repeated string index_ids = 3;
  // True means the field is searchable (indexed) in at least some indices.
  // False means the field is not searchable in any indices.
  bool searchable = 4;
  // True means the field is aggregatable (fast) in at least some indices.
  // False means the field is not aggregatable in any indices.
  bool aggregatable = 5;
  // The index ids the field exists, but is not searchable.
  repeated string non_searchable_index_ids = 6;
  // The index ids the field exists, but is not aggregatable
  repeated string non_aggregatable_index_ids = 7;
}

enum ListFieldType {
    STR = 0;
    U64 = 1;
    I64 = 2;
    F64 = 3;
    BOOL = 4;
    DATE = 5;
    FACET = 6;
    BYTES = 7;
    IP_ADDR = 8;
    JSON = 9;
}
message ListFields {
  repeated ListFieldsEntryResponse fields = 1;
}
// -- Search -------------------

message SearchRequest {
  // Index ID patterns
  repeated string index_id_patterns = 1;

  // deprecated `query``
  reserved 2;

  // Json object representing Quickwit's QueryAst.
  string query_ast = 13;

  // deprecated `search_fields``
  reserved 3;

  // Time filter, expressed in seconds since epoch.
  // That filter is to be interpreted as the semi-open interval:
  // [start_timestamp, end_timestamp).
  // If the query AST contains a range query over the timestamp field,
  // then the the bounds of the range query are used directly and
  // these two fields are ignored.
  optional int64 start_timestamp = 4;
  optional int64 end_timestamp = 5;

  // Maximum number of hits to return.
  uint64 max_hits = 6;

  // First hit to return. Together with max_hits, this parameter
  // can be used for pagination.
  //
  // E.g.
  // The results with rank [start_offset..start_offset + max_hits) are returned.
  uint64 start_offset = 7;

  // deprecated tag field
  reserved 8;

  // deprecated `sort_order``
  reserved 9;

  // deprecated `sort_by_field``
  reserved 10;

  // json serialized aggregation_request
  optional string aggregation_request = 11;

  // Fields to extract snippet on
  repeated string snippet_fields = 12;

  // Optional sort by one or more fields (limited to 2 at the moment).
  repeated SortField sort_fields = 14;

  // If set, the search response will include a search id
  // that will make it possible to paginate through the results
  // in a consistent manner.
  optional uint32 scroll_ttl_secs = 15;

  // Document with sort tuple smaller or equal to this are discarded to
  // enable pagination.
  // If split_id is empty, no comparison with _shard_doc should be done
  optional PartialHit search_after = 16;

  CountHits count_hits = 17;

  // When an exact index ID is provided (not a pattern), the query fails only if
  // that index is not found and this parameter is set to `false`.
  bool ignore_missing_indexes = 18;

  // When true, skip finalization of aggregation results and return
  // the raw IntermediateAggregationResults bytes instead.
  bool skip_aggregation_finalization = 19;
}

enum CountHits {
  // Count all hits, querying all splits.
  COUNT_ALL = 0;
  // Give an underestimate of the number of hits, possibly skipping entire
  // splits if they are otherwise not needed to fulfull a query.
  UNDERESTIMATE = 1;
}

message SortField {
  string field_name = 1;
  SortOrder sort_order = 2;
  // Optional sort value format for datetime field only.
  // If none, the default output format for datetime field is
  // unix_timestamp_nanos.
  optional SortDatetimeFormat sort_datetime_format = 3;
}

enum SortOrder {
  // Ascending order.
  ASC = 0;
  // Descending order.
  DESC = 1; //< This will be the default value;
}

// Sort value format for datetime field.
// We keep an enum with only one format
// for future extension.
enum SortDatetimeFormat {
  UNIX_TIMESTAMP_MILLIS = 0;
  UNIX_TIMESTAMP_NANOS = 1;
}

message SearchResponse {
  // Number of hits matching the query.
  uint64 num_hits = 1;
  // Matched hits
  repeated Hit hits = 2;
  // Elapsed time to perform the request. This time is measured
  // server-side and expressed in microseconds.
  uint64 elapsed_time_micros = 3;

  // The searcherrors that occurred formatted as string.
  repeated string errors = 4;

  // used to be json-encoded aggregation
  reserved 5;

  // Postcard-encoded aggregation response
  optional bytes aggregation_postcard = 9;

  // Scroll Id (only set if scroll_secs was set in the request)
  optional string scroll_id = 6;

  // Returns the list of splits for which search failed.
  // For the moment, the cause is unknown.
  //
  // It is up to the caller to decide whether to interpret
  // this as an overall failure or to present the partial results
  // to the end user.
  repeated SplitSearchError failed_splits = 7;

  // Total number of successful splits searched.
  uint64 num_successful_splits = 8;

  // Per-request execution telemetry. See `RootResourceStats` for the
  // execution model and a diagnostic playbook. Optional for backwards
  // compatibility — older servers / clients may omit this.
  optional RootResourceStats resource_stats = 10;
}

message SearchPlanResponse {
  string result = 1;
}

message SplitSearchError {
  // The searcherror that occurred formatted as string.
  string error = 1;

  // Split id that failed.
  string split_id = 2;

  // Flag to indicate if the error can be considered a retryable error
  bool retryable_error = 3;
}

// A LeafSearchRequest can span multiple indices.
message LeafSearchRequest {
  // Search request. This is a perfect copy of the original search request
  // that was sent to root apart from the start_offset, max_hits params and index_id_patterns.
  // index_id_patterns contains the actual index ids queried on that leaf.
  SearchRequest search_request = 1;

  // List of leaf requests, one per index.
  repeated LeafRequestRef leaf_requests = 7;

  // List of unique doc_mappers serialized as json.
  repeated string doc_mappers = 8;

  // List of index uris
  // Index URI. The index URI defines the location of the storage that contains the
  // split files.
  repeated string index_uris = 9;
}

// Per-leaf execution stats for a single leaf search response.
//
// All fields are cheap to compute (counters and `Instant::now()` calls
// already on the hot path). Aggregated by the root into `RootResourceStats`
// — see that message for the request-scoped view and the diagnostic
// playbook.
message ResourceStats {
    // Bytes pulled into the per-request short-lived cache during warmup.
    // Proxy for "bytes downloaded from object storage" by this leaf.
    //
    // The proxy is inaccurate because of some of the data could have been in cache.
    uint64 short_lived_cache_num_bytes = 1;
    // Total number of documents in the splits the leaf considered for search.
    // (after timestamp/tag pruning).
    uint64 split_num_docs = 2;
    // Wall time spent in the warmup phase (downloading metadata + hot bytes).
    uint64 warmup_microsecs = 3;
    // Time spent queued waiting for a permit on the search CPU thread pool.
    // Reflects pool saturation, not the cost of the query itself.
    uint64 cpu_thread_pool_wait_microsecs = 4;
    // CPU time spent on the search CPU thread pool — matching, scoring,
    // top-k collection, and aggregation collection combined.
    uint64 cpu_microsecs = 5;
    // CPU time spent specifically inside the aggregation collector,
    // measured around `AggregationSegmentCollector::collect_block` calls.
    // Zero when the request has no aggregation.
    uint64 aggregation_cpu_microsecs = 6;
    // Wall clock time for the entire leaf request, measured from the
    // entry of `multi_index_leaf_search` to the moment the merged
    // response is ready to return. Includes I/O permit waits, warmup
    // (parallel across splits), CPU permit queueing, search execution,
    // and the per-leaf merge.
    //
    // This is set ONCE per leaf request — the per-split path does not
    // populate it, so `merge_resource_stats` summing across per-split
    // responses leaves it at zero, and the leaf-level handler then
    // overwrites with the actual wall time.
    //
    // The root takes the max and sum of this field across leaves to
    // populate `RootResourceStats.max_leaf_wall_microsecs` and
    // `sum_leaf_wall_microsecs` — i.e. the slowest leaf and the basis
    // for an imbalance ratio.
    uint64 wall_microsecs = 7;
}

// =============================================================================
// RootResourceStats — execution telemetry for a single search request.
// =============================================================================
//
// Aggregate of cheap-to-compute counters and timers, summed/maxed across all
// leaf responses participating in a search, plus a few root-side measurements
// (merge time, leaf count). The intent is to give an operator (or an AI agent)
// enough signal to attribute slowness to a specific stage of the search
// pipeline and to estimate whether the implementation has headroom.
//
// This is the request-scoped sibling of the per-leaf `ResourceStats`. Where
// `ResourceStats` describes one leaf's view of one or more splits,
// `RootResourceStats` describes the whole request as observed from the root.
//
// -----------------------------------------------------------------------------
// Quickwit search execution model (one request, end-to-end)
// -----------------------------------------------------------------------------
//
// A search request flows through the following stages. Each stage has at
// least one field below that exposes its cost.
//
//   1. Root planning. The root server resolves the index metadata, picks the
//      splits to search (timestamp/tag pruning), groups them by leaf, and
//      issues a `LeafSearchRequest` to every leaf. The cost of this phase is
//      *not* covered by RootResourceStats today (typically negligible).
//
//   2. Leaf-side, per-split execution. Each leaf processes its assigned
//      splits concurrently. Per split the lifecycle is:
//        a. Acquire an I/O permit (admission control on concurrent
//           downloads).
//        b. WARMUP — download all required data from object storage (split
//           metadata, posting list headers, term dictionary blocks needed
//           by the query, fast-field headers). These bytes land in a
//           per-request "short-lived cache" so subsequent reads are local.
//        c. Acquire a CPU permit on the search CPU thread pool. Until a
//           permit is granted the task is *queued* — this queueing time is
//           recorded as `cpu_thread_pool_wait_microsecs`.
//        d. Execute the query on the search CPU thread pool: matching/scoring,
//           top-k collection, and (if requested) aggregation. CPU time
//           spent here is `cpu_microsecs`.
//           Time spent specifically inside the aggregation collector is
//           `aggregation_cpu_microsecs`.
//           The thread pool is sized to match the number of hyperthreads
//           available, so that this is very close to the actual CPU usage.
//        e. Return a partial result.
//
//   3. Leaf-side merge. Each leaf merges its per-split partial results
//      into a single `LeafSearchResponse` (top-k merge, aggregation tree
//      merge).
//
//   4. Root merge. The root collects every `LeafSearchResponse` and merges
//      them into the final `SearchResponse`. The wall time of this stage
//      is `root_merge_microsecs`.
//
// -----------------------------------------------------------------------------
// Interpreting these fields — diagnostic playbook
// -----------------------------------------------------------------------------
//
// Let:
//   wall          := elapsed_time_micros (top-level field on SearchResponse)
//   cpu           := total_cpu_microsecs
//   wait          := total_cpu_thread_pool_wait_microsecs
//   warmup        := total_warmup_microsecs
//   agg_cpu       := total_aggregation_cpu_microsecs
//   max_leaf      := max_leaf_wall_microsecs
//   avg_leaf      := sum_leaf_wall_microsecs / num_leaf_responses
//   downloaded    := total_short_lived_cache_num_bytes
//   docs_in_split := total_split_num_docs
//   docs_matched  := total_num_docs_matched
//
// Suggested rules of thumb (orient triage, not strict thresholds):
//
//   * CPU-bound query:      cpu  >~ 0.5 * (wall * num_search_cpu_threads)
//                           and warmup small relative to wall.
//                           => look at the query plan; check for
//                              unselective predicates, range queries on
//                              tokenized fields, phrase queries with
//                              frequent terms.
//
//   * I/O-bound query:      warmup >~ 0.5 * wall, or `downloaded` is large
//                           (hundreds of MB / GBs).
//                           => cold cache, large fast fields, many splits,
//                              or first-time access patterns. Check whether
//                              a different fast-field layout or a smaller
//                              time range would help.
//
//   * Cluster overloaded:   wait >~ cpu (waiting longer than computing).
//                           => the search CPU pool is saturated by other
//                              requests; the query itself may be fine.
//                              Re-run in isolation to confirm.
//
//   * Aggregation-heavy:    agg_cpu >~ 0.5 * cpu.
//                           => aggregation is the bottleneck, not matching.
//                              Look at bucket cardinality, sub-aggregations,
//                              or unbounded `terms` aggregations.
//
//   * Imbalance across leaves:  (max_leaf - avg_leaf) / avg_leaf >~ 1.
//                           => request fan-out is uneven. Common causes:
//                              one leaf has many more splits, one leaf has
//                              a colder cache, or other workload is
//                              starving one leaf's CPU pool.
//
//   * Too much work:         docs_matched >~ docs_in_split * 0.5.
//                           => query is barely selective; consider tighter
//                              filters, time pruning, or sample-based
//                              approaches.
//
//   * Headroom estimate:     wall * num_search_cpu_threads - cpu - wait
//                           ~ idle CPU capacity unused by this request.
//                           If positive and large, parallelism is the
//                           limiting factor (more splits, more leaves).
//                           If near zero, we are at compute saturation.
//
// All values are sums/maxes over leaf responses unless noted. They are
// designed to be cheap (counters and `Instant::now()` calls already in the
// hot path) so they can be returned with every search response.
// -----------------------------------------------------------------------------
message RootResourceStats {
    // -------------------------------------------------------------------------
    // Sums across leaf responses
    // -------------------------------------------------------------------------

    // Sum of `cpu_microsecs` reported by every leaf — total wall time
    // spent on the search CPU thread pool, summed across all leaves.
    //
    // Compare against `wall * num_search_cpu_threads_per_leaf *
    // num_leaf_responses` to estimate CPU utilization. A value close to
    // that upper bound means the request was compute-saturated.
    //
    // Includes time spent matching, scoring, top-k collection, and
    // aggregation collection. Does NOT include warmup or queueing.
    uint64 total_cpu_microsecs = 1;

    // Sum of `warmup_microsecs` across leaves.
    //
    // Warmup is the phase where the leaf downloads, from object storage,
    // the bytes it needs to evaluate the query (split metadata, posting
    // list / dictionary blocks, fast-field headers). It runs before the
    // query is dispatched to the search CPU pool.
    //
    // High values relative to `total_cpu_microsecs` signal an I/O-bound
    // request — cold short-lived cache, large fast fields, high split
    // count, or cross-region object storage latency.
    uint64 total_warmup_microsecs = 2;

    // Sum of `cpu_thread_pool_wait_microsecs` across leaves.
    //
    // Time leaves spent *queued*, waiting for a permit on the search CPU
    // thread pool after warmup completed. This is admission-control
    // queueing, not work.
    //
    // If this is comparable to or larger than `total_cpu_microsecs`, the
    // cluster is CPU-saturated by other workloads — the query itself may
    // be fine. Re-run in isolation to confirm.
    uint64 total_cpu_thread_pool_wait_microsecs = 3;

    // CPU time spent specifically inside the aggregation collector,
    // summed across leaves. Zero when the request has no aggregation.
    //
    // Measured by sampling `Instant::now()` around each call to
    // `AggregationSegmentCollector::collect_block` (block size <= 2048
    // docs). Overhead is well below noise (~0.15 ns per matched doc).
    //
    // Compare to `total_cpu_microsecs` to get the fraction of CPU spent
    // in aggregation. A high fraction (>~ 50%) points at heavy
    // bucketization (terms with high cardinality, deep sub-aggregations)
    // rather than at predicate matching.
    uint64 total_aggregation_cpu_microsecs = 4;

    // Sum of `short_lived_cache_num_bytes` across leaves — the size of
    // the per-request hot-byte cache populated during warmup. A reasonable
    // proxy for "GB downloaded from object storage for this query".
    //
    // Useful to flag I/O-heavy queries even when `total_warmup_microsecs`
    // is hidden by parallelism (many splits, each downloading concurrently).
    uint64 total_short_lived_cache_num_bytes = 5;

    // Sum of `split_num_docs` across leaves — the total number of
    // documents in all splits searched, after timestamp/tag pruning at
    // the root and any further pruning at the leaf.
    //
    // This is the size of the haystack the query had to traverse. Pair
    // with `total_num_docs_matched` to gauge selectivity.
    uint64 total_split_num_docs = 9;

    // Sum across leaves of the number of docs that matched the query
    // (i.e. were passed to the collector via `collect_block` /
    // `collect`). For non-aggregation queries this equals the global
    // `num_hits` on `SearchResponse`; for aggregation queries it is the
    // raw match count, which `num_hits` may not surface.
    //
    // Selectivity = `total_num_docs_matched / total_split_num_docs`.
    // A value near 1 means the query is barely filtering and the cost
    // is dominated by traversal of essentially every doc.
    uint64 total_num_docs_matched = 10;

    // -------------------------------------------------------------------------
    // Aggregates over leaves (for imbalance detection)
    // -------------------------------------------------------------------------

    // Number of leaf responses folded into this stats object. Useful as
    // the denominator when computing per-leaf averages from the sums above.
    uint64 num_leaf_responses = 6;

    // Wall time of the slowest leaf. This is a tight lower bound on the
    // request's wall time (modulo root merge) because the root must wait
    // for every leaf.
    //
    // If `max_leaf_wall_microsecs ~= elapsed_time_micros`, optimization
    // effort should focus on the slowest leaf, not on parallelism.
    uint64 max_leaf_wall_microsecs = 7;

    // Sum of leaf wall times across all responding leaves. Combined with
    // `num_leaf_responses` and `max_leaf_wall_microsecs`, lets the caller
    // derive the imbalance ratio:
    //     avg = sum_leaf_wall_microsecs / num_leaf_responses
    //     imbalance = (max_leaf_wall_microsecs - avg) / avg
    // A high imbalance indicates skew — uneven split assignment, cold
    // cache on one leaf, or competing workload pinning a single leaf's
    // CPU pool.
    uint64 sum_leaf_wall_microsecs = 8;

    // -------------------------------------------------------------------------
    // Root-side instrumentation
    // -------------------------------------------------------------------------

    // Wall time spent in the root's merge step — combining leaf top-k
    // results and intermediate aggregation results into the final
    // `SearchResponse`. Typically small for plain searches; non-trivial
    // for heavy aggregations (large bucket trees, deep sub-aggregations).
    uint64 root_merge_microsecs = 11;
}

// LeafRequestRef references data in LeafSearchRequest to deduplicate data.
message LeafRequestRef {
  // The ordinal of the doc_mapper in `LeafSearchRequest.doc_mappers`
  uint32 doc_mapper_ord = 1;

  // The ordinal of the index uri in LeafSearchRequest.index_uris
  uint32 index_uri_ord = 2;

  // Index split ids to apply the query on.
  // This ids are resolved from the index_uri defined in the search_request.
  repeated SplitIdAndFooterOffsets split_offsets = 3;
}

message SplitIdAndFooterOffsets {
  // Index split id to apply the query on.
  // This id is resolved from the index_uri defined in the search_request.
  string split_id = 1;
  // The offset of the start of footer in the split bundle. The footer contains the file bundle metadata and the hotcache.
  uint64 split_footer_start = 2;
  // The offset of the end of the footer in split bundle. The footer contains the file bundle metadata and the hotcache.
  uint64 split_footer_end = 3;
  // The lowest timestamp appearing in the split, in seconds since epoch
  optional int64 timestamp_start = 4;
  // The highest timestamp appearing in the split, in seconds since epoch
  optional int64 timestamp_end = 5;
  // The number of docs in the split
  uint64 num_docs = 6;
}

// Hits returned by a FetchDocRequest.
//
// The json that is joined is the raw tantivy json doc.
// It is very different from a quickwit json doc.
//
// For instance:
// - it may contain a _source and a _dynamic field.
// - since tantivy has no notion of cardinality,
//  all fields are arrays.
// - since tantivy has no notion of object, the object is
//  flattened by concatenating the path to the root.
//
// See  `quickwit_search::convert_leaf_hit`
message LeafHit {
  // The actual content of the hit/
  string leaf_json = 1;
  // The partial hit (ie: the sorting field + the document address)
  PartialHit partial_hit = 2;
  // A snippet of the matching content
  optional string leaf_snippet_json = 3;
}

message Hit {
  // The actual content of the hit
  string json = 1;
  // The partial hit (ie: the sorting field + the document address)
  PartialHit partial_hit = 2;
  // A snippet of the matching content
  optional string snippet = 3;
  // The index id of the hit
  string index_id = 4;
}


// A partial hit, is a hit for which we have not fetch the content yet.
// Instead, it holds a document_uri which is enough information to
// go and fetch the actual document data, by performing a `get_doc(...)`
// request.
message PartialHit {
  // Value of the sorting key for the given document.
  //
  // Quickwit only computes top-K of this sorting field.
  // If the user requested for a bottom-K of a given fast field, then quickwit simply
  // emits an decreasing mapping of this fast field.
  //
  // In case of a tie, quickwit uses the increasing order of
  // - the split_id,
  // - the segment_ord,
  // - the doc id.

  // Deprecated
  reserved 1;
  // Room for eventual future sorted key types.
  reserved 12 to 20;
  SortByValue sort_value = 10;
  SortByValue sort_value2 = 11;

  string split_id = 2;

  // (segment_ord, doc) form a tantivy DocAddress, which is sufficient to identify a document
  // within a split
  uint32 segment_ord = 3;

  // The DocId identifies a unique document at the scale of a tantivy segment.
  uint32 doc_id = 4;
}

message SortByValue {
  oneof sort_value {
  uint64 u64 = 1;
  int64 i64 = 2;
  double f64 = 3;
  bool boolean = 4;
  }
  // Room for eventual future sorted key types.
  reserved 5 to 20;
}

message LeafSearchResponse {
  // Total number of documents matched by the query.
  uint64 num_hits = 1;

  // List of the best top-K candidates for the given leaf query.
  repeated PartialHit partial_hits = 2;

  // The list of splits that failed. LeafSearchResponse can be an aggregation of results, so there may be multiple.
  repeated SplitSearchError failed_splits = 3;

  // Total number of attempt to search into splits.
  // We do have:
  // `num_splits_requested == num_successful_splits + num_failed_splits.len()`
  // But we do not necessarily have:
  // `num_splits_requested = num_attempted_splits because of retries.`
  uint64 num_attempted_splits = 4;

  // Total number of successful splits searched.
  uint64 num_successful_splits = 7;

  // Deprecated json serialized intermediate aggregation_result.
  reserved 5;

  // postcard serialized intermediate aggregation_result.
  optional bytes intermediate_aggregation_result = 6;

  ResourceStats resource_stats = 8;
}

// The result of searching a single split in a Lambda invocation.
// Each result is tagged with its split_id so that ordering is irrelevant.
message LambdaSingleSplitResult {
  // The split that was searched.
  string split_id = 1;
  oneof outcome {
    // On success, the leaf search response for this split.
    LeafSearchResponse response = 2;
    // On failure, the error message.
    string error = 3;
  }
}

// Wrapper for per-split results from a Lambda invocation.
message LambdaSearchResponses {
  reserved 1; // was: repeated LeafSearchResponse responses
  repeated LambdaSingleSplitResult split_results = 2;
}

message SnippetRequest {
  repeated string snippet_fields = 1;
  string query_ast_resolved = 2;
}

message FetchDocsRequest {
  // Request fetching the content of a given list of partial_hits.
  repeated PartialHit partial_hits = 1;

  // Split footer offsets. They are required for fetch docs to
  // fetch the document content in two reads, when the footer is not
  // cached.
  repeated SplitIdAndFooterOffsets split_offsets = 3;

  // Index URI. The index URI defines the location of the storage that contains the
  // split files.
  string index_uri = 4;

  optional SnippetRequest snippet_request = 7;

  // `DocMapper` as json serialized trait.
  string doc_mapper = 6;

  reserved 5;
}

message FetchDocsResponse {
  // List of complete hits.
  repeated LeafHit hits = 1;
}

message ListTermsRequest {
  // Index ID patterns
  repeated string index_id_patterns = 1;

  // Field to search on
  string field = 3;

  // Time filter
  optional int64 start_timestamp = 4;
  optional int64 end_timestamp = 5;

  // Maximum number of hits to return.
  optional uint64 max_hits = 6;

  // start_key is included, end_key is excluded
  optional bytes start_key = 7;
  optional bytes end_key = 8;
}

message ListTermsResponse {
  // Number of hits matching the query.
  uint64 num_hits = 1;
  // Matched hits
  repeated bytes terms = 2;
  // Elapsed time to perform the request. This time is measured
  // server-side and expressed in microseconds.
  uint64 elapsed_time_micros = 3;

  // The searcherrors that occurred formatted as string.
  repeated string errors = 4;
}

message LeafListTermsRequest {
  // Search request. This is a perfect copy of the original list request,
  ListTermsRequest list_terms_request = 1;

  // Index split ids to apply the query on.
  // This ids are resolved from the index_uri defined in the search_request.
  repeated SplitIdAndFooterOffsets split_offsets = 2;

  // Index URI. The index URI defines the location of the storage that contains the
  // split files.
  string index_uri = 3;
}

message LeafListTermsResponse {
  // Total number of documents matched by the query.
  uint64 num_hits = 1;

  // List of the first K terms the given leaf query.
  repeated bytes terms = 2;

  // The list of splits that failed. LeafSearchResponse can be an aggregation of results, so there may be multiple.
  repeated SplitSearchError failed_splits = 3;

  // Total number of single split search attempted.
  uint64 num_attempted_splits = 4;
}
