\* TLC Configuration for MergePipelineShutdown.tla
\*
\* Single config — covers the full lifecycle including crash + restart and
\* multi-process lifetimes. State space ~217K distinct states; finishes in
\* ~7 seconds on a workstation (safety + liveness combined).
\*
\* Coverage:
\*   - Multi-phase merge completion (Upload then Publish, with Crash between)
\*   - Crash mid-flight (uploaded outputs become orphan_outputs)
\*   - Disconnect → Publish (output published but planner not informed)
\*   - Crash → Restart cycle (fetch_immature_splits re-seeds cold_windows)
\*   - Graceful shutdown → Restart (fresh process post-shutdown)
\*   - Cross-window non-mixing (two windows, splits stay in their window)
\*   - Multi-level merge (level 0 → 1 → mature at level 2)
\*
\* Tuning notes:
\*   - MaxIngests dominates state space (~5x per increment).
\*   - MaxRestarts = 2 inflates to ~3M states; liveness check then takes
\*     several minutes on the temporal-tableau pass. Bump only when
\*     investigating a specific multi-lifetime concern.
\*   - For fast iteration during spec development: comment out PROPERTIES
\*     (liveness is the expensive part); INVARIANTS alone run in ~1 second.

CONSTANTS
    MaxMerges = 2
    MaxFinalizeOps = 1
    Windows = {w1, w2}
    MergeFactor = 2
    MaxIngests = 4
    MaxMergeOps = 2
    MaxCrashes = 1
    MaxRestarts = 1

CHECK_DEADLOCK FALSE

SPECIFICATION Spec

INVARIANTS
    TypeInvariant
    RowsConserved
    NoSplitLoss
    NoDuplicateMerge
    NoOrphanInPlanner
    NoOrphanWhenConnected
    LeakIsObjectStoreOnly
    MP1_LevelHomogeneity
    BoundedWriteAmp
    FinalizeWithinBound
    ShutdownOnlyWhenDrained

PROPERTIES
    RestartReSeedsAllImmature
    ShutdownEventuallyCompletes
    NoPersistentOrphan
