\* TLC Configuration for ParquetDataModel.tla (small / quick iteration)
\*
\* Minimal configuration: 1 node, 1 metric, 1 tag set, 1 timestamp,
\* up to 3 ingest requests. Designed for fast feedback during
\* development (~1s, hundreds of states).
\*
\* Run:
\*   tlc -config docs/internals/specs/tla/ParquetDataModel_small.cfg \
\*       docs/internals/specs/tla/ParquetDataModel.tla

CONSTANTS
    Nodes = {n1}
    MetricNames = {m1}
    TagSets = {tags1}
    Timestamps = {1}
    RequestCountMax = 3

CHECK_DEADLOCK FALSE

SPECIFICATION Spec

INVARIANTS
    TypeInvariant
    DM1_PointPerRow
    DM2_NoLWW
    DM3_NoInterpolation
    DM4_DeterministicTSID
    DM5_TSIDPersistence
