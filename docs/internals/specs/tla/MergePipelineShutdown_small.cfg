\* TLC Configuration for MergePipelineShutdown.tla (small model)
\* Quick iteration: minimal state space for fast feedback.
\*
\* Expected runtime: ~seconds, hundreds of states.

CONSTANTS
    MaxMerges = 1
    MaxFinalizeOps = 1
    Windows = {w1}
    MergeFactor = 2
    MaxIngests = 2

CHECK_DEADLOCK FALSE

SPECIFICATION Spec

INVARIANTS
    NoSplitLoss
    NoDuplicateMerge
    FinalizeWithinBound
    ShutdownOnlyWhenDrained

PROPERTIES
    ShutdownEventuallyCompletes
