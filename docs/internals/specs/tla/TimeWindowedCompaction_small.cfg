\* TLC Configuration for TimeWindowedCompaction.tla (small model)
\* Quick iteration: minimal state space for fast feedback.
\*
\* Expected runtime: ~seconds, hundreds of states.

CONSTANTS
    Timestamps = {0, 1}
    AllColumns = {m, v}
    Scopes = {s1}
    WindowDuration = 2
    HourSeconds = 4
    CompactionStartTime = 0
    LateDataAcceptanceWindow = 2
    MaxTime = 1
    MaxPoints = 2
    MaxCompactions = 1
    SortKeys = {1, 2}

CHECK_DEADLOCK FALSE

SPECIFICATION Spec

INVARIANTS
    TypeInvariant
    TW1_OneWindowPerSplit
    TW2_DurationDividesHour
    TW3_NoCrossWindowMerge
    CS1_ScopeCompatibility
    CS2_SameWindowStart
    CS3_CompactionStartTime
    MC1_RowSetPreserved
    MC2_RowContentsPreserved
    MC3_SortOrderPreserved
    MC4_ColumnUnion
