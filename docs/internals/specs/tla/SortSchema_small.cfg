\* TLC Configuration for SortSchema.tla (small model for quick iteration)
\* Reduced constants: 1 column, up to 2 rows per split, up to 2 splits, 1 schema change
\*
\* Expected runtime: seconds
\* Run:
\*   tlc -config docs/internals/specs/tla/SortSchema_small.cfg docs/internals/specs/tla/SortSchema.tla

CONSTANTS
    Columns = {c1}
    RowsPerSplitMax = 2
    SplitsMax = 2
    SchemaChangesMax = 1

CHECK_DEADLOCK FALSE

SPECIFICATION Spec

INVARIANTS
    TypeInvariant
    SS1_RowsSorted
    SS2_NullOrdering
    SS3_MissingColumnsAreNull
    SS4_SchemaImmutable
    SS5_SchemaConsistency
