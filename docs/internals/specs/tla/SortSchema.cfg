\* TLC Configuration for SortSchema.tla
\* Full verification: 2 columns, up to 3 rows per split, up to 4 splits, 2 schema changes
\*
\* Expected runtime: minutes (depending on hardware)
\* Run:
\*   tlc -workers 4 -config docs/internals/specs/tla/SortSchema.cfg docs/internals/specs/tla/SortSchema.tla

CONSTANTS
    Columns = {c1, c2}
    RowsPerSplitMax = 3
    SplitsMax = 4
    SchemaChangesMax = 2

CHECK_DEADLOCK FALSE

SPECIFICATION Spec

INVARIANTS
    TypeInvariant
    SS1_RowsSorted
    SS2_NullOrdering
    SS3_MissingColumnsAreNull
    SS4_SchemaImmutable
    SS5_SchemaConsistency
