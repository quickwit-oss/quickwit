\* TLC Configuration for TimeWindowedCompaction.tla
\* Full verification: explores the complete state space.
\*
\* Expected runtime: ~minutes with 4 workers.

CONSTANTS
    Timestamps = {0, 1, 2, 3}
    AllColumns = {m, v, h}
    Scopes = {s1, s2}
    WindowDuration = 2
    HourSeconds = 4
    CompactionStartTime = 0
    LateDataAcceptanceWindow = 3
    MaxTime = 3
    MaxPoints = 4
    MaxCompactions = 3
    SortKeys = {1, 2, 3}

CHECK_DEADLOCK FALSE

SPECIFICATION Spec

INVARIANTS
    TypeInvariant
    TW1_OneWindowPerSplit
    TW2_DurationDividesHour
    TW3_NoCrossWindowMerge
    CS1_ScopeCompatibility
    CS2_SameWindowStart
    CS3_CompactionStartTime
    MC1_RowSetPreserved
    MC2_RowContentsPreserved
    MC3_SortOrderPreserved
    MC4_ColumnUnion
