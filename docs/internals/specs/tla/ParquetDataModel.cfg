\* TLC Configuration for ParquetDataModel.tla
\*
\* Full configuration: 2 nodes, 2 metrics, 2 tag sets, 2 timestamps,
\* up to 6 ingest requests. Explores the full state space including
\* multiple compaction rounds and cross-node duplicate ingestion.
\*
\* Expected runtime: minutes (millions of states) with 4 workers.
\*
\* Run:
\*   tlc -workers 4 \
\*       -config docs/internals/specs/tla/ParquetDataModel.cfg \
\*       docs/internals/specs/tla/ParquetDataModel.tla

CONSTANTS
    Nodes = {n1, n2}
    MetricNames = {m1, m2}
    TagSets = {tags1, tags2}
    Timestamps = {1, 2}
    RequestCountMax = 6

CHECK_DEADLOCK FALSE

SPECIFICATION Spec

INVARIANTS
    TypeInvariant
    DM1_PointPerRow
    DM2_NoLWW
    DM3_NoInterpolation
    DM4_DeterministicTSID
    DM5_TSIDPersistence

PROPERTIES
    Liveness
